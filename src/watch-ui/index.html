<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>twa sess watch — terminal-workspace-for-agent</title>
  <link rel="stylesheet" href="/vendor/xterm.css">
  <link rel="stylesheet" href="/style.css">
  <script src="/vendor/xterm.js"></script>
</head>
<body>
  <div class="page">
    <header class="site-header">
      <div class="brand">
        <img src="/logo.png" alt="terminal-workspace-for-agent" class="brand-logo">
        <div class="brand-meta">
          <span class="watch-badge">watch</span>
          <p class="hint">Read-only · click a session tab to switch</p>
        </div>
      </div>
      <div id="tabs" class="tabs-wrap"></div>
    </header>

    <main class="main">
      <div class="terminal-shell">
        <div id="terminal" class="terminal-host"></div>
      </div>
      <p id="status" class="status-line" aria-live="polite"></p>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
